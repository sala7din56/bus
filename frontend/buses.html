<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buses - Erbil Bus Transit</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-logo-area" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span class="material-icons">directions_bus</span>
                <span class="logo-text">Erbil Bus Transit</span>
            </div>
            <button class="menu-close-btn" id="mobileMenuCloseBtn">
                <span class="material-icons">close</span>
            </button>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-item">
                <span class="material-icons">dashboard</span> Dashboard
            </a>
            <a href="live.html" class="sidebar-item">
                <span class="material-icons">map</span> Live View
            </a>
            <a href="routes.html" class="sidebar-item">
                <span class="material-icons">route</span> Routes & Stops
            </a>
            <a href="depots.html" class="sidebar-item">
                <span class="material-icons">garage</span> Bus Depots
            </a>
            <a href="buses.html" class="sidebar-item active">
                <span class="material-icons">directions_bus</span> Buses
            </a>
            <a href="schedules.html" class="sidebar-item">
                <span class="material-icons">schedule</span> Schedules
            </a>
            <a href="drivers.html" class="sidebar-item">
                <span class="material-icons">badge</span>
                <div style="display: flex; flex-direction: column; line-height: 1.2;">
                    <span>Drivers</span>
                    <span style="font-size: 10px; opacity: 0.7;" dir="rtl">شۆفێرەکان</span>
                </div>
            </a>
        </nav>

        <div class="sidebar-bottom">
            <div class="admin-profile-sm">
                <div class="admin-avatar">A</div>
                <div>
                    <div style="font-weight: 600; font-size: 14px; margin-bottom: 2px;" id="adminName">Admin User</div>
                    <div style="font-size: 12px; opacity: 0.6;">Administrator</div>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn">
                <span class="material-icons">logout</span> Logout
            </button>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left" style="display: flex; align-items: center; gap: 16px;">
                <button class="menu-toggle-btn" id="mobileMenuBtn">
                    <span class="material-icons">menu</span>
                </button>
                <div>
                    <h1 class="page-title">Buses</h1>
                    <div class="page-subtitle" dir="rtl">پاسەکان</div>
                </div>
            </div>
            
            <div class="topbar-center">
                <div class="search-bar">
                    <span class="material-icons">search</span>
                    <input type="text" placeholder="Search buses, routes..." id="searchInput">
                </div>
            </div>
            
            <div class="topbar-right">
                <div style="margin-right: 16px;">
                    <label for="switch" class="switch">
                        <input id="switch" type="checkbox" />
                        <span class="slider"></span>
                        <span class="decoration"></span>
                    </label>
                </div>
                <div class="admin-avatar" style="border: 2px solid var(--color-teal); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;">A</div>
            </div>
        </header>

        <main class="main-content">
            <div class="card-container">
                <div class="card-header">
                    <div class="card-title" style="display: flex; align-items: center; gap: 8px;">
                        Manage Active Buses 
                        <span id="refreshIndicator" class="material-icons" style="font-size: 16px; color: var(--color-text-muted); opacity: 0; transition: opacity 0.3s;">sync</span>
                    </div>
                    <button class="btn btn-primary" id="addBusBtn">
                        <span class="material-icons">add</span> Add Bus
                    </button>
                </div>
                <div id="busesTableContainer">
                    <div class="skeleton" style="height: 400px; margin: 20px;"></div>
                </div>
            </div>
        </main>
    </div>
</div>

<script type="module" src="js/buses.js"></script>
</body>
</html>
