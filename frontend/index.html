<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Erbil Bus Transit</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: radial-gradient(circle at center, #2C3E50 0%, var(--color-navy) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--color-text-dark);
            margin: 0;
        }
        
        .login-card {
            background: var(--color-card);
            width: 440px;
            border-radius: 40px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            text-align: center;
        }

        .login-logo {
            color: var(--color-teal);
            font-size: 56px;
            margin-bottom: 16px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 4px;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--color-text-muted);
            margin-bottom: 32px;
            font-weight: 500;
        }

        .login-form {
            text-align: left;
        }

        .login-btn {
            width: 100%;
            height: 50px;
            border-radius: var(--radius-btn);
            font-size: 16px;
            margin-top: 12px;
        }

        .error-message {
            color: var(--color-red);
            font-size: 14px;
            font-weight: 600;
            margin-top: 16px;
            text-align: left;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            height: 0;
            overflow: hidden;
        }

        .error-message.show {
            opacity: 1;
            transform: translateY(0);
            height: auto;
            margin-top: 16px;
            margin-bottom: -16px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <span class="material-icons login-logo">directions_bus</span>
        <h1 class="login-title">Erbil Bus Transit</h1>
        <p class="login-subtitle">ترانزیتی پاسی هەولێر</p>

        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="admin@erbilbus.iq" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary login-btn">
                <span>Sign In</span>
                <span class="material-icons" style="font-size: 20px;">arrow_forward</span>
            </button>

            <div id="errorMessage" class="error-message"></div>
        </form>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
